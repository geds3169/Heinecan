<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Heinecan - Le Jeu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png">
</head>
<body>

    <div id="home-screen" class="screen">
        <img src="icon-512.png" class="main-logo-img" alt="Logo Heinecan">
        <h1 class="logo-text">HEINECAN</h1>
        <p class="tagline">Tournez la bouteille, relevez le défi.</p>
        <button class="btn-main pulse" onclick="showSetup()">Lancer la soirée</button>
        <div class="settings-trigger" onclick="toggleSettings()">⚙️</div>
    </div>

    <div id="setup-screen" class="screen hidden">
        <div class="card">
            <h2>Combien de cibles ?</h2>
            <input type="number" id="player-count" min="2" max="12" value="4">
            <button class="btn-main" onclick="initPhotoPhase()">Suivant</button>
        </div>
    </div>

    <div id="photo-screen" class="screen hidden">
        <h2 id="photo-instruction">Joueur 1 : Cadrez-vous</h2>
        <div id="photo-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="photo-canvas" class="hidden"></canvas>
            <div id="photo-preview"></div>
        </div>
        <div class="gender-btns">
            <button class="btn-gender male" onclick="savePlayer('H')">♂ Homme</button>
            <button class="btn-gender female" onclick="savePlayer('F')">♀ Femme</button>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <canvas id="main-canvas"></canvas>
        
        <div id="choice-overlay" class="overlay hidden">
            <h2 id="designated-name">À ton tour !</h2>
            <div class="btn-group">
                <button class="btn-choice action" onclick="pickTask('action')">ACTION ⚡</button>
                <button class="btn-choice verite" onclick="pickTask('verite')">VÉRITÉ 💡</button>
            </div>
        </div>

        <div id="task-overlay" class="overlay hidden">
            <div id="timer-display">30</div>
            <p id="task-text">Chargement...</p>
            <div id="verdict-buttons" class="hidden">
                <p>Défi relevé ?</p>
                <div class="btn-group">
                    <button class="btn-success" onclick="endTurn(true)">RÉUSSI ✔️</button>
                    <button class="btn-danger" onclick="endTurn(false)">ÉCHEC 🗑️</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="toggleSettings()">&times;</span>
            <h3>Ajouter un défi</h3>
            <textarea id="custom-text" placeholder="Ex: Chante 'Allumer le feu' à {X}"></textarea>
            <select id="custom-type">
                <option value="action">Action</option>
                <option value="verite">Vérité</option>
            </select>
            <select id="custom-interaction">
                <option value="none">Solo</option>
                <option value="any">N'importe qui {X}</option>
                <option value="opposite_gender">Genre Opposé {XO}</option>
            </select>
            <button class="btn-main" onclick="addNewTask()">Enregistrer</button>
            <div id="custom-list-container">
                <h4>Tes gages :</h4>
                <ul id="custom-list"></ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
