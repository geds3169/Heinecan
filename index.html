<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heine-can</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>
<!-- Bannière installation PWA -->
<div id="install-banner">
  <p>Ajoutez Heine-can à votre écran d'accueil pour jouer offline !</p>
  <button id="installBtn">Installer</button>
</div>

<!-- Conteneur du jeu -->
<div id="game-container">
  <div id="circle"></div>
  <div id="bottle"></div>
  <div id="timer">30</div>
  <div id="controls">
    <button id="actionBtn">Action</button>
    <button id="truthBtn">Vérité</button>
    <button id="validateBtn">Validé</button>
    <button id="refuseBtn">Refusé</button>
    <button id="pauseBtn">Pause</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
